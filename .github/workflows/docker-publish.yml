name: Build & Push Docker Images — NOC Monitoring Pro

on:
  push:
    branches: ["main", "master"]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE:  ghcr.io/afani-arba/noc-monitoring-pro-backend
  FRONTEND_IMAGE: ghcr.io/afani-arba/noc-monitoring-pro-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "backend_tags=${{ env.BACKEND_IMAGE }}:latest,${{ env.BACKEND_IMAGE }}:$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "frontend_tags=${{ env.FRONTEND_IMAGE }}:latest,${{ env.FRONTEND_IMAGE }}:$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.tags.outputs.backend_tags }}
          no-cache: true
          build-args: |
            APP_COMMIT_SHA=${{ steps.tags.outputs.short_sha }}
            APP_EDITION=monitoring_pro

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.tags.outputs.frontend_tags }}
          no-cache: true
          build-args: |
            APP_COMMIT_SHA=${{ steps.tags.outputs.short_sha }}
            REACT_APP_EDITION=monitoring_pro
            REACT_APP_PRODUCT_NAME=NOC Monitoring Pro

      - name: Summary
        run: |
          echo "## ✅ NOC Monitoring Pro — Build Selesai" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | \`${{ env.BACKEND_IMAGE }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`${{ env.FRONTEND_IMAGE }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Install VPS 1 perintah:**" >> $GITHUB_STEP_SUMMARY
          echo "\`curl -fsSL https://raw.githubusercontent.com/afani-arba/noc-monitoring-pro/main/install-noc-monitoring-pro.sh | sudo bash\`" >> $GITHUB_STEP_SUMMARY
