server {
    listen 80;
    server_name _;

    # Folder tempat build React berada
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Gzip compression untuk kecepatan
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml;
    gzip_disable "MSIE [1-6]\.";

    # Routing Frontend (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy ke Backend ───────────────────────────────────────────────────
    # noc-backend dan noc-frontend berada dalam 1 bridge network yang sama.
    # Docker DNS (127.0.0.11) bisa resolve hostname 'noc-backend' dengan benar.
    # CATATAN: Jangan ubah noc-backend ke network_mode: host — akan break DNS ini.
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $backend "http://noc-backend:8000";

    # Reverse Proxy API ke Backend Container
    location /api/ {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }
}
